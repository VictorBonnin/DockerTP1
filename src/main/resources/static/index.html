<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚗 Gestion de Voitures — DockerTP1</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0f0f1a;
            color: #e0e0e0;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Animated background */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(ellipse at 20% 50%, rgba(99, 102, 241, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(168, 85, 247, 0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(59, 130, 246, 0.05) 0%, transparent 50%);
            z-index: -1;
            animation: bgMove 20s ease-in-out infinite alternate;
        }

        @keyframes bgMove {
            0% {
                transform: translate(0, 0) rotate(0deg);
            }

            100% {
                transform: translate(-2%, -2%) rotate(3deg);
            }
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
        }

        /* Header */
        header {
            text-align: center;
            margin-bottom: 2.5rem;
            animation: fadeInDown 0.6s ease-out;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        header h1 {
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #818cf8, #a78bfa, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.4rem;
        }

        header p {
            color: #888;
            font-size: 0.95rem;
            font-weight: 300;
        }

        /* Status badge */
        .status-bar {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin-bottom: 2rem;
            animation: fadeIn 0.8s ease-out 0.2s both;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.4rem 0.9rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .badge .dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #22c55e;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.4;
            }
        }

        /* Cards */
        .card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 16px;
            padding: 1.8rem;
            margin-bottom: 1.5rem;
            backdrop-filter: blur(10px);
            animation: fadeInUp 0.5s ease-out both;
        }

        .card:nth-child(2) {
            animation-delay: 0.1s;
        }

        .card:nth-child(3) {
            animation-delay: 0.2s;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(15px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card h2 {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 1.2rem;
            color: #c4b5fd;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        /* Form */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 0.8rem;
            margin-bottom: 1rem;
        }

        @media (max-width: 600px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
        }

        .form-group label {
            display: block;
            font-size: 0.75rem;
            font-weight: 500;
            color: #888;
            margin-bottom: 0.35rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .form-group input {
            width: 100%;
            padding: 0.65rem 0.9rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: #e0e0e0;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            transition: all 0.2s ease;
            outline: none;
        }

        .form-group input:focus {
            border-color: #818cf8;
            box-shadow: 0 0 0 3px rgba(129, 140, 248, 0.15);
        }

        .form-group input::placeholder {
            color: #555;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
            padding: 0.65rem 1.4rem;
            border: none;
            border-radius: 10px;
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            width: 100%;
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.3);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-danger {
            background: rgba(239, 68, 68, 0.15);
            color: #f87171;
            border: 1px solid rgba(239, 68, 68, 0.2);
            padding: 0.4rem 0.8rem;
            font-size: 0.78rem;
        }

        .btn-danger:hover {
            background: rgba(239, 68, 68, 0.25);
            border-color: rgba(239, 68, 68, 0.4);
        }

        /* Table */
        .table-wrapper {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead th {
            text-align: left;
            padding: 0.7rem 1rem;
            font-size: 0.72rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: #888;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }

        tbody tr {
            transition: background 0.15s ease;
        }

        tbody tr:hover {
            background: rgba(255, 255, 255, 0.03);
        }

        tbody td {
            padding: 0.8rem 1rem;
            font-size: 0.9rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
        }

        .plate-badge {
            display: inline-block;
            padding: 0.25rem 0.6rem;
            background: rgba(99, 102, 241, 0.12);
            border: 1px solid rgba(99, 102, 241, 0.2);
            border-radius: 6px;
            font-size: 0.82rem;
            font-weight: 600;
            color: #a5b4fc;
            font-family: 'Courier New', monospace;
        }

        .brand-name {
            font-weight: 500;
        }

        .price {
            color: #34d399;
            font-weight: 600;
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 2.5rem 1rem;
            color: #555;
        }

        .empty-state .icon {
            font-size: 2.5rem;
            margin-bottom: 0.6rem;
        }

        .empty-state p {
            font-size: 0.9rem;
        }

        /* Toast notification */
        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            padding: 0.8rem 1.2rem;
            border-radius: 10px;
            font-size: 0.85rem;
            font-weight: 500;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        .toast.success {
            background: rgba(34, 197, 94, 0.15);
            border: 1px solid rgba(34, 197, 94, 0.3);
            color: #4ade80;
        }

        .toast.error {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #f87171;
        }

        /* Counter */
        .counter {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: rgba(99, 102, 241, 0.15);
            color: #a5b4fc;
            font-size: 0.72rem;
            font-weight: 700;
            width: 22px;
            height: 22px;
            border-radius: 6px;
            margin-left: 0.4rem;
        }

        /* Loading spinner */
        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-top-color: #818cf8;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            display: inline-block;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Row animations */
        .row-enter {
            animation: rowSlide 0.3s ease-out;
        }

        @keyframes rowSlide {
            from {
                opacity: 0;
                transform: translateX(-10px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        footer {
            text-align: center;
            margin-top: 2rem;
            padding: 1rem;
            color: #444;
            font-size: 0.78rem;
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <h1>🚗 Gestion de Voitures</h1>
            <p>DockerTP3 — Spring Boot + JUnit + GitHub Actions</p>
            <p>Séance du 09/04/2026</p>
        </header>

        <div class="status-bar">
            <div class="badge">
                <span class="dot"></span>
                API connectée
            </div>
            <div class="badge">
                Tests JUnit actifs
            </div>
        </div>

        <!-- Add car form -->
        <div class="card">
            <h2>➕ Ajouter une voiture</h2>
            <form id="addCarForm">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="plateNumber">Plaque d'immatriculation</label>
                        <input type="text" id="plateNumber" placeholder="AB-123-CD" required>
                    </div>
                    <div class="form-group">
                        <label for="brand">Marque</label>
                        <input type="text" id="brand" placeholder="Renault" required>
                    </div>
                    <div class="form-group">
                        <label for="price">Prix (€)</label>
                        <input type="number" id="price" placeholder="25000" step="0.01" min="0" required>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary" id="submitBtn">
                    Ajouter la voiture
                </button>
            </form>
        </div>

        <!-- Car list -->
        <div class="card">
            <h2>📋 Liste des voitures <span class="counter" id="carCount">0</span></h2>
            <div class="table-wrapper">
                <div id="carList"></div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <footer>
        Victor BONNIN — TP DevOps Efrei
    </footer>

    <script>
        const API_URL = '/cars';

        // Show toast notification
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type} show`;
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // Format price
        function formatPrice(price) {
            return new Intl.NumberFormat('fr-FR', {
                style: 'currency',
                currency: 'EUR',
                minimumFractionDigits: 0,
                maximumFractionDigits: 2
            }).format(price);
        }

        // Load cars from API
        async function loadCars() {
            try {
                const response = await fetch(API_URL);
                const cars = await response.json();
                renderCars(cars);
            } catch (error) {
                showToast('Erreur de connexion à l\'API', 'error');
            }
        }

        // Render car list
        function renderCars(cars) {
            const container = document.getElementById('carList');
            document.getElementById('carCount').textContent = cars.length;

            if (cars.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">🅿️</div>
                        <p>Aucune voiture enregistrée</p>
                        <p style="margin-top: 0.3rem; font-size: 0.8rem;">Ajoutez votre première voiture ci-dessus</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = `
                <table>
                    <thead>
                        <tr>
                            <th>Plaque</th>
                            <th>Marque</th>
                            <th>Prix</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody>
                        ${cars.map(car => `
                            <tr class="row-enter">
                                <td><span class="plate-badge">${escapeHtml(car.plateNumber)}</span></td>
                                <td class="brand-name">${escapeHtml(car.brand)}</td>
                                <td class="price">${formatPrice(car.price)}</td>
                                <td style="text-align: right;">
                                    <button class="btn btn-danger" onclick="deleteCar('${escapeHtml(car.plateNumber)}')">
                                        Supprimer
                                    </button>
                                </td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
        }

        // Escape HTML to prevent XSS
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Add a car
        async function addCar(event) {
            event.preventDefault();

            const plateNumber = document.getElementById('plateNumber').value.trim();
            const brand = document.getElementById('brand').value.trim();
            const price = parseFloat(document.getElementById('price').value);

            if (!plateNumber || !brand || isNaN(price)) {
                showToast('Veuillez remplir tous les champs', 'error');
                return;
            }

            const submitBtn = document.getElementById('submitBtn');
            submitBtn.innerHTML = '<span class="spinner"></span> Ajout en cours...';
            submitBtn.disabled = true;

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ plateNumber, brand, price })
                });

                if (response.ok) {
                    showToast(`${brand} (${plateNumber}) ajoutée avec succès !`);
                    document.getElementById('addCarForm').reset();
                    await loadCars();
                } else {
                    showToast('Erreur lors de l\'ajout', 'error');
                }
            } catch (error) {
                showToast('Erreur de connexion', 'error');
            } finally {
                submitBtn.innerHTML = 'Ajouter la voiture';
                submitBtn.disabled = false;
            }
        }

        // Delete a car
        async function deleteCar(plateNumber) {
            try {
                const response = await fetch(`${API_URL}/${plateNumber}`, {
                    method: 'DELETE'
                });

                if (response.ok) {
                    showToast(`Voiture ${plateNumber} supprimée`);
                    await loadCars();
                } else {
                    showToast('Erreur lors de la suppression', 'error');
                }
            } catch (error) {
                showToast('Erreur de connexion', 'error');
            }
        }

        // Initialize
        document.getElementById('addCarForm').addEventListener('submit', addCar);
        loadCars();
    </script>
</body>

</html>
