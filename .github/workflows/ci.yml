name: CI

on:
  push:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-test-docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installer Java 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
          cache: gradle

      - name: Rendre gradlew exécutable
        run: chmod +x gradlew

      - name: Lancer les tests
        run: ./gradlew test

      - name: Builder l'application
        run: ./gradlew build

      - name: Builder l'image Docker
        run: docker build -t dockertp1:ci .